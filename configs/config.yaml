assets:
  - BTC-USD
  - ETH-USD

data:
  start_date: "2020-01-01"
  end_date: null
  interval: "1d"
  raw_dir: "data/raw"
  processed_dir: "data/processed"

features:
  context_length: 60
  prediction_horizon: 14
  target: "log_return"

model:
  name: "amazon/chronos-t5-small"
  num_samples: 100
  device: "cpu"

evaluation:
  test_split: 0.2

output:
  plots_dir: "outputs/plots"
  forecasts_dir: "outputs/forecasts"
